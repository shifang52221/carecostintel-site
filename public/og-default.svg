<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">CareCost Intelligence</title>
  <desc id="desc">Planning-grade estimates for senior care costs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e3a5d" />
      <stop offset="50%" stop-color="#12406a" />
      <stop offset="100%" stop-color="#0b2b45" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b48f2b" />
      <stop offset="100%" stop-color="#e0c46b" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1020" cy="-40" r="260" fill="#1a4b7a" opacity="0.35" />
  <circle cx="-40" cy="620" r="220" fill="#144068" opacity="0.25" />
  <rect x="80" y="100" width="1040" height="430" rx="24" fill="#ffffff" fill-opacity="0.08" />
  <rect x="110" y="140" width="6" height="350" rx="3" fill="url(#accent)" />

  <g fill="#ffffff" font-family="'Fraunces', Georgia, 'Times New Roman', serif">
    <text x="150" y="240" font-size="54" font-weight="700">CareCost Intelligence</text>
  </g>
  <g fill="#e9eef5" font-family="'Manrope', Arial, sans-serif">
    <text x="150" y="300" font-size="28" font-weight="500">Plan senior care costs with clarity.</text>
    <text x="150" y="340" font-size="22" font-weight="400">Estimator, state guides, and planning tools.</text>
  </g>

  <g fill="none" stroke="#6fb2d1" stroke-width="6" opacity="0.7">
    <path d="M150 430 C260 390, 420 370, 600 380 C780 390, 920 430, 1050 420" />
    <circle cx="600" cy="380" r="10" fill="#6fb2d1" stroke="none" />
  </g>

  <g fill="#d9e4ef" font-family="'Manrope', Arial, sans-serif" font-size="16">
    <text x="150" y="485">Planning-grade ranges - updated annually</text>
  </g>
</svg>
